<div class="login-card">
    <div class="login-header">
      <div class="brand-logo">VZ</div>
      <h1>VEZZI</h1>
      <p>Sistema de Punto de Venta</p>
    </div>

    <form class="login-form" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="username">Usuario</label>
        <lucide-icon name="user" size="18" class="icon"></lucide-icon>
        <input type="text" id="username" name="username" [(ngModel)]="username" placeholder="usuario" required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <lucide-icon name="key-round" size="18" class="icon"></lucide-icon>
        <input [type]="mostrarPassword ? 'text' : 'password'" id="password" name="password" [(ngModel)]="password" placeholder="••••••••" required>
        <button type="button" (click)="mostrarPassword = !mostrarPassword" class="btn-eye">
          <lucide-icon [name]="mostrarPassword ? 'eye' : 'eye-off'" size="18" class="eye"></lucide-icon>
        </button>
      </div>

      <button type="submit" class="btn-submit" [disabled]="cargando">
        @if (cargando) {
          Iniciando sesión...
        } @else {
          Iniciar sesión
        }
      </button>
      
    </form>
    
    @if (error) {
      <p class="error">{{ error }}</p>
    }

    <div class="login-footer">
      <span>VEZZI POS v2.4.1 · © 2026</span>
    </div>
</div>
